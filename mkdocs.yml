site_name: Stasis Documentation
site_description: >-
  Digital Wellbeing & Productivity Tracker for Windows —
  screen-time tracking, focus scoring, app blocking, and Telegram remote control.
site_url: https://arshsisodiya.github.io/Stasis
repo_url: https://github.com/arshsisodiya/Stasis
repo_name: arshsisodiya/Stasis
edit_uri: edit/master/docs/

copyright: Copyright &copy; Arsh Sisodiya

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: DM Sans
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/heart-pulse
  favicon: https://raw.githubusercontent.com/arshsisodiya/Stasis/master/assets/dashboard.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.integrate

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Privacy Policy: privacy-policy.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - API Reference: api-reference.md
  - Database Schema: database.md
  - Telegram: telegram.md
  - Developer Guide: developer-guide.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/arshsisodiya/Stasis
      name: Stasis on GitHub
